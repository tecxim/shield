<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAC Shield Solutions- Gerador de Scripts Múltiplos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 24px 32px;
            border-radius: 12px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            text-align: center;
        }

        .header h1 {
            color: #1a1a2e;
            font-size: 28px;
        }

        .header h1 span {
            color: #4e86da;
        }

        .header p {
            color: #666;
            margin-top: 8px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .card h2 {
            font-size: 18px;
            color: #333;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid #f0f2f5;
        }

        .dominio-row {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .dominio-input {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            font-family: monospace;
        }

        .dominio-input:focus {
            outline: none;
            border-color: #4e86da;
        }

        .btn-remover {
            background: #dc3545;
            color: white;
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }

        .btn-remover:hover {
            background: #c82333;
        }

        .btn-adicionar {
            background: #28a745;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 8px;
        }

        .btn-adicionar:hover {
            background: #218838;
        }

        .btn-gerar-todos {
            width: 100%;
            background: #4e86da;
            color: white;
            padding: 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            margin-top: 16px;
        }

        .btn-gerar-todos:hover {
            background: #3a6db8;
        }

        .resultado-item {
            border: 1px solid #e8e8e8;
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 16px;
            background: #fafafa;
        }

        .resultado-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 12px;
        }

        .resultado-dominio {
            font-weight: 600;
            color: #1a1a2e;
            font-size: 16px;
            font-family: monospace;
        }

        .btn-copiar {
            background: #28a745;
            color: white;
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .script-code {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #d4d4d4;
            background: #1e1e1e;
            padding: 12px;
            border-radius: 6px;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }

        footer {
            text-align: center;
            padding: 24px;
            color: #aaa;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>WAC <span>Shield Solutions</span></h1>
            <p>Gerador de Script para o Seu Domínio</p>
        </div>

        <div class="card">
            <h2>📝 Domínios</h2>
            <div id="dominiosList"></div>
            <button class="btn-adicionar" onclick="adicionarDominio()">+ Adicionar outro domínio</button>
            <button class="btn-gerar-todos" onclick="gerarTodosScripts()">🚀 Gerar Scripts para Todos</button>
        </div>

        <div class="card">
            <h2>📋 Scripts Gerados</h2>
            <div id="resultados"></div>
        </div>

        <footer>
            WAC Shield - Chat Widget para seu site
        </footer>
    </div>

    <script>
        let dominios = ['', '', '', '', '', '', '', '', '', ''];

        function renderizarDominios() {
            const container = document.getElementById('dominiosList');
            container.innerHTML = '';
            
            dominios.forEach((dom, index) => {
                const row = document.createElement('div');
                row.className = 'dominio-row';
                row.innerHTML = `
                    <input type="text" class="dominio-input" placeholder="Ex: meusite.com.br" value="${escapeHtml(dom)}" onchange="atualizarDominio(${index}, this.value)">
                    <button class="btn-remover" onclick="removerDominio(${index})" ${index < 1 ? 'disabled style="opacity:0.5;"' : ''}>Remover</button>
                `;
                container.appendChild(row);
            });
        }

        function atualizarDominio(index, valor) {
            let dominio = valor.trim().toLowerCase();
            dominio = dominio.replace(/^https?:\/\//, '').replace(/^www\./, '').replace(/\/$/, '');
            dominios[index] = dominio;
        }

        function adicionarDominio() {
            dominios.push('');
            renderizarDominios();
        }

        function removerDominio(index) {
            if (dominios.length > 1) {
                dominios.splice(index, 1);
                renderizarDominios();
            }
        }

        function gerarTodosScripts() {
            const resultadosDiv = document.getElementById('resultados');
            resultadosDiv.innerHTML = '';
            
            let temDominio = false;
            
            for (let i = 0; i < dominios.length; i++) {
                const dominio = dominios[i];
                if (dominio && dominio.length > 0) {
                    temDominio = true;
                    const scriptHtml = `<div id="wac-chat-container" data-loja="${dominio}"></div>\n<script src="https://wacshield.com/wac-widget.js"><\/script>`;
                    
                    const resultadoItem = document.createElement('div');
                    resultadoItem.className = 'resultado-item';
                    resultadoItem.innerHTML = `
                        <div class="resultado-header">
                            <span class="resultado-dominio">📁 ${escapeHtml(dominio)}</span>
                            <button class="btn-copiar" onclick="copiarScript(this)">Copiar</button>

                        </div>
                        <div class="script-code">${escapeHtml(scriptHtml)}</div>
                    `;
                    resultadosDiv.appendChild(resultadoItem);
                }
            }
            
            // Adicionar event listeners após criar os botões
            document.querySelectorAll('.btn-copiar').forEach(btn => {
                btn.addEventListener('click', () => {
                    const script = btn.getAttribute('data-script');
                    copiarScript(script);
                });
            });
            
            if (!temDominio) {
                resultadosDiv.innerHTML = '<div class="loading">⚠️ Nenhum domínio informado. Preencha pelo menos um domínio.</div>';
            }
        }

        function copiarScript(botao) {
            // Pega o elemento irmão que contém o script
            const scriptCodeDiv = botao.parentElement.nextElementSibling;
            let textoParaCopiar = scriptCodeDiv.innerText;
            
            navigator.clipboard.writeText(textoParaCopiar).then(() => {
                alert('✅ Script copiado!');
            }).catch(() => {
                const textarea = document.createElement('textarea');
                textarea.value = textoParaCopiar;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                alert('✅ Script copiado!');
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Inicializar
        renderizarDominios();
    </script>
</body>
</html>
