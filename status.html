<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>WAC Security - Status</title>
<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: #e2e8f0;
    display: flex;
    justify-content: center;
    padding: 40px;
}
.container { width: 420px; }
.card {
    background: #1e293b;
    padding: 25px;
    border-radius: 12px;
    margin-bottom: 20px;
}
h2 { text-align: center; margin-bottom: 20px; }
.service {
    display: flex;
    justify-content: space-between;
    margin: 10px 0;
}
.status { font-weight: bold; }
.online { color: #22c55e; }
.offline { color: #ef4444; }
.history {
    display: flex;
    gap: 4px;
    margin-top: 10px;
}
.bar {
    width: 8px;
    height: 20px;
    border-radius: 2px;
}
.bar.ok { background: #22c55e; }
.bar.fail { background: #ef4444; }
.small { font-size: 12px; color: #94a3b8; }
</style>
</head>
<body>
<div class="container">

<div class="card">
    <h2>🛡️ WAC Security</h2>

    <div class="service">
        <span>Cloud Bridge</span>
        <span id="bridge" class="status">...</span>
    </div>

    <div class="service">
        <span>GitHub</span>
        <span id="github" class="status">...</span>
    </div>

    <div class="service">
        <span>Worker Status</span>
        <span id="worker" class="status">...</span>
    </div>

    <div class="small">
        Última verificação: <span id="time"></span>
    </div>
</div>

<div class="card">
    <strong>Uptime (sessão atual)</strong>
    <div id="uptime">0%</div>
    <div class="history" id="history"></div>
</div>

</div>

<script>
let checks = [];

function setStatus(id, ok, label) {
    const el = document.getElementById(id);
    el.className = "status " + (ok ? "online" : "offline");
    el.innerText = label;
}

function addHistory(ok) {
    checks.push(ok);
    if (checks.length > 30) checks.shift();

    const historyEl = document.getElementById("history");
    historyEl.innerHTML = "";

    checks.forEach(c => {
        const bar = document.createElement("div");
        bar.className = "bar " + (c ? "ok" : "fail");
        historyEl.appendChild(bar);
    });

    const uptime = (checks.filter(x => x).length / checks.length) * 100;
    document.getElementById("uptime").innerText = uptime.toFixed(1) + "%";
}

function timeoutFetch(url, ms = 4000) {
    return Promise.race([
        fetch(url),
        new Promise((_, reject) => setTimeout(() => reject(new Error("timeout")), ms))
    ]);
}

async function check() {
    const timeEl = document.getElementById("time");
    if(timeEl) timeEl.innerText = new Date().toLocaleString();

    const workerUrl = "https://wac-shield-bridge.suportewrsystems.workers.dev";
    let ok = true;

    // --- TESTE 1: Cloud Bridge (Ping) ---
    try {
        const res = await fetch(`${workerUrl}/ping?t=${Date.now()}`);
        setStatus("bridge", res.ok, res.ok ? "Operational" : "Offline");
        if(!res.ok) ok = false;
    } catch {
        setStatus("bridge", false, "Offline");
        ok = false;
    }

    // --- TESTE 2: GitHub (Oficial) ---
    try {
        const res = await fetch("https://api.github.com/zen");
        setStatus("github", res.ok, res.ok ? "Connected" : "Issues");
        if(!res.ok) ok = false;
    } catch {
        setStatus("github", false, "Issues");
        ok = false;
    }

    // --- TESTE 3: Worker Status (JSON) ---
    try {
        const res = await fetch(`${workerUrl}/status?t=${Date.now()}`);
        const data = await res.json();
        setStatus("worker", data.status === "online", data.status === "online" ? "Online" : "Offline");
        if(data.status !== "online") ok = false;
    } catch {
        setStatus("worker", false, "Offline");
        ok = false;
    }

    addHistory(ok);
}

// Inicia a verificação e define intervalo
check();
setInterval(check, 30000);

check();
setInterval(check, 30000);
</script>
</body>
</html>
