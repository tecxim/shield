<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>System Status - WAC Security</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f9; text-align: center; padding: 50px; }
        .status-card { background: white; padding: 30px; border-radius: 10px; display: inline-block; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 5px solid #2ecc71; }
        .service { display: flex; justify-content: space-between; width: 300px; margin: 15px 0; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .online { color: #2ecc71; font-weight: bold; }
        .pulse { height: 10px; width: 10px; background-color: #2ecc71; border-radius: 50%; display: inline-block; box-shadow: 0 0 0 rgba(46, 204, 113, 0.4); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(46, 204, 113, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(46, 204, 113, 0); } 100% { box-shadow: 0 0 0 0 rgba(46, 204, 113, 0); } }
    </style>
</head>
<body>
    <div class="status-card">
        <h2>🛡️ WAC Security Status</h2>
        <div class="service">
            <span>Cloud Bridge API</span>
            <span class="online"><span class="pulse"></span> Operational</span>
        </div>
        <div class="service">
            <span>Update Server (GitHub)</span>
            <span class="online">Connected</span>
        </div>
        <div class="service">
            <span>Geo-IP Database</span>
            <span class="online">Updated</span>
        </div>
        <p style="font-size: 0.8em; color: #777;">Última verificação: <span id="time"></span></p>
    </div>
    <script>document.getElementById('time').innerText = new Date().toLocaleString();</script>
</body>
</html>
